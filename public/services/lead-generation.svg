<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="funnelG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="funnelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#431407" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1c0a00" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="210" rx="165" ry="150" fill="url(#bgGlow)"/>

  <!-- Funnel body -->
  <polygon points="52,72 348,72 264,196 136,196" fill="url(#funnelFill)" stroke="url(#funnelG)" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="136,196 264,196 232,322 168,322" fill="url(#funnelFill)" stroke="url(#funnelG)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Funnel inner glow lines -->
  <g filter="url(#g)" opacity="0.5">
    <line x1="92" y1="112" x2="308" y2="112" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="115" y1="152" x2="285" y2="152" stroke="#fb923c" stroke-width="1.2"/>
    <line x1="148" y1="222" x2="252" y2="222" stroke="#f97316" stroke-width="1"/>
    <line x1="158" y1="258" x2="242" y2="258" stroke="#f97316" stroke-width="1"/>
  </g>

  <!-- Incoming lead particles (top) -->
  <g filter="url(#g)">
    <!-- Row 1 -->
    <circle cx="112" cy="52" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="160" cy="44" r="10" fill="#fb923c" stroke="#f97316" stroke-width="2"/>
    <circle cx="200" cy="40" r="14" fill="#fbbf24" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="244" cy="44" r="10" fill="#fb923c" stroke="#f97316" stroke-width="2"/>
    <circle cx="290" cy="52" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <!-- Person icons inside circles -->
    <circle cx="112" cy="48" r="4" fill="#7c2d12"/>
    <path d="M106,58 Q112,55 118,58" fill="none" stroke="#7c2d12" stroke-width="1.5"/>
    <circle cx="200" cy="36" r="5" fill="#78350f"/>
    <path d="M193,46 Q200,43 207,46" fill="none" stroke="#78350f" stroke-width="1.8"/>
    <circle cx="290" cy="48" r="4" fill="#7c2d12"/>
    <path d="M284,58 Q290,55 296,58" fill="none" stroke="#7c2d12" stroke-width="1.5"/>
    <!-- Row 2 -->
    <circle cx="76" cy="36" r="7" fill="#fdba74" opacity="0.7"/>
    <circle cx="328" cy="36" r="7" fill="#fdba74" opacity="0.7"/>
    <circle cx="200" cy="22" r="6" fill="#fbbf24" opacity="0.6"/>
  </g>

  <!-- Flow trails -->
  <g opacity="0.35" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="112" y1="64" x2="150" y2="100"/>
    <line x1="200" y1="54" x2="200" y2="100"/>
    <line x1="290" y1="64" x2="252" y2="100"/>
  </g>

  <!-- Mid-funnel filtered particles -->
  <g filter="url(#g)">
    <circle cx="180" cy="228" r="9" fill="#f97316" stroke="#fed7aa" stroke-width="1.8"/>
    <circle cx="200" cy="242" r="8" fill="#ea580c" stroke="#fed7aa" stroke-width="1.5"/>
    <circle cx="222" cy="228" r="9" fill="#f97316" stroke="#fed7aa" stroke-width="1.8"/>
  </g>

  <!-- Output pipe -->
  <g filter="url(#g)">
    <rect x="186" y="322" width="28" height="38" rx="6" fill="#431407" stroke="#f97316" stroke-width="2"/>
    <!-- Star lead output -->
    <circle cx="200" cy="382" r="20" fill="#431407" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="200" cy="382" r="20" fill="#431407" stroke="#f97316" stroke-width="1.5" opacity="0.5" transform="scale(1.3) translate(-46,-108)"/>
    <circle cx="200" cy="382" r="8" fill="#fbbf24"/>
    <circle cx="200" cy="382" r="3" fill="#7c2d12"/>
    <!-- Star rays -->
    <line x1="200" y1="358" x2="200" y2="364" stroke="#fbbf24" stroke-width="2.5"/>
    <line x1="200" y1="396" x2="200" y2="402" stroke="#fbbf24" stroke-width="2.5" opacity="0.7"/>
    <line x1="178" y1="382" x2="184" y2="382" stroke="#fbbf24" stroke-width="2.5"/>
    <line x1="216" y1="382" x2="222" y2="382" stroke="#fbbf24" stroke-width="2.5"/>
  </g>

  <!-- Side badges -->
  <g filter="url(#g)">
    <rect x="14" y="152" width="62" height="34" rx="12" fill="#1c0a00" stroke="#f97316" stroke-width="1.8"/>
    <circle cx="31" cy="169" r="7" fill="#f97316" opacity="0.9"/>
    <rect x="42" y="163" width="28" height="5" rx="2.5" fill="#fdba74" opacity="0.8"/>
    <rect x="42" y="172" width="20" height="4" rx="2" fill="#fdba74" opacity="0.55"/>
    <rect x="324" y="152" width="62" height="34" rx="12" fill="#1c0a00" stroke="#fbbf24" stroke-width="1.8"/>
    <circle cx="341" cy="169" r="7" fill="#fbbf24" opacity="0.9"/>
    <rect x="352" y="163" width="28" height="5" rx="2.5" fill="#fde68a" opacity="0.8"/>
    <rect x="352" y="172" width="20" height="4" rx="2" fill="#fde68a" opacity="0.55"/>
  </g>
</svg>
