<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="headerG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="calG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1007"/>
      <stop offset="100%" stop-color="#0f0904"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="210" rx="165" ry="150" fill="url(#bgGlow)"/>

  <!-- Calendar card -->
  <rect x="46" y="74" width="254" height="268" rx="18" fill="url(#calG)" stroke="#92400e" stroke-width="2.5"/>
  <!-- Header -->
  <rect x="46" y="74" width="254" height="52" rx="18" fill="url(#headerG)"/>
  <rect x="46" y="108" width="254" height="18" fill="url(#headerG)"/>
  <!-- Month title -->
  <text x="173" y="104" text-anchor="middle" fill="white" font-size="15" font-family="Arial" font-weight="bold">JUNE 2026</text>
  <!-- Nav arrows -->
  <text x="68" y="104" fill="white" font-size="16" font-family="Arial" opacity="0.9">‹</text>
  <text x="268" y="104" fill="white" font-size="16" font-family="Arial" opacity="0.9">›</text>
  <!-- Binding rings -->
  <g filter="url(#g)">
    <circle cx="110" cy="74" r="9" fill="#92400e" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="173" cy="74" r="9" fill="#92400e" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="236" cy="74" r="9" fill="#92400e" stroke="#fbbf24" stroke-width="2"/>
  </g>

  <!-- Day headers -->
  <g fill="#78350f" font-size="9" font-family="Arial" text-anchor="middle" font-weight="bold">
    <text x="76"  y="148">M</text>
    <text x="112" y="148">T</text>
    <text x="148" y="148">W</text>
    <text x="184" y="148">T</text>
    <text x="220" y="148">F</text>
    <text x="256" y="148">S</text>
    <text x="292" y="148">S</text>
  </g>
  <line x1="56" y1="154" x2="290" y2="154" stroke="#92400e" stroke-width="1" opacity="0.5"/>

  <!-- Week 1 -->
  <g fill="#6b4c1e" font-size="11" font-family="Arial" text-anchor="middle">
    <text x="76"  y="176">1</text><text x="112" y="176">2</text>
    <text x="148" y="176">3</text><text x="184" y="176">4</text>
    <text x="220" y="176">5</text><text x="256" y="176">6</text><text x="292" y="176">7</text>
  </g>

  <!-- Week 2 — with booked highlight -->
  <g font-size="11" font-family="Arial" text-anchor="middle">
    <text x="76"  y="212" fill="#6b4c1e">8</text>
    <text x="112" y="212" fill="#6b4c1e">9</text>
    <!-- Booked: 10 -->
    <g filter="url(#g)">
      <circle cx="148" cy="207" r="16" fill="#065f46" stroke="#4ade80" stroke-width="2"/>
      <text x="148" y="212" fill="#4ade80" font-weight="bold" font-size="10">10</text>
    </g>
    <text x="184" y="212" fill="#6b4c1e">11</text>
    <text x="220" y="212" fill="#6b4c1e">12</text>
    <!-- Booked: 13 -->
    <g filter="url(#g)">
      <circle cx="256" cy="207" r="16" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
      <text x="256" y="212" fill="#93c5fd" font-weight="bold" font-size="10">13</text>
    </g>
    <text x="292" y="212" fill="#6b4c1e">14</text>
  </g>

  <!-- Week 3 -->
  <g font-size="11" font-family="Arial" text-anchor="middle">
    <text x="76"  y="248" fill="#6b4c1e">15</text>
    <text x="112" y="248" fill="#6b4c1e">16</text>
    <text x="148" y="248" fill="#6b4c1e">17</text>
    <!-- Today highlight -->
    <g filter="url(#g)">
      <circle cx="184" cy="243" r="16" fill="#7c1d1d" stroke="#f87171" stroke-width="2"/>
      <text x="184" y="248" fill="white" font-weight="bold" font-size="10">18</text>
    </g>
    <!-- Booked: 19 -->
    <g filter="url(#g)">
      <circle cx="220" cy="243" r="16" fill="#065f46" stroke="#4ade80" stroke-width="2"/>
      <text x="220" y="248" fill="#4ade80" font-weight="bold" font-size="10">19</text>
    </g>
    <text x="256" y="248" fill="#6b4c1e">20</text>
    <text x="292" y="248" fill="#6b4c1e">21</text>
  </g>

  <!-- Week 4 -->
  <g fill="#4a3010" font-size="11" font-family="Arial" text-anchor="middle">
    <text x="76"  y="284">22</text><text x="112" y="284">23</text>
    <text x="148" y="284">24</text><text x="184" y="284">25</text>
    <text x="220" y="284">26</text><text x="256" y="284">27</text><text x="292" y="284">28</text>
  </g>
  <!-- Week 5 -->
  <g fill="#3a2510" font-size="11" font-family="Arial" text-anchor="middle">
    <text x="76"  y="320">29</text><text x="112" y="320">30</text>
  </g>

  <!-- Clock (right side) -->
  <g filter="url(#g)" transform="translate(332,130)">
    <circle r="38" fill="#1c1007" stroke="#f59e0b" stroke-width="3"/>
    <circle r="4" fill="#fbbf24"/>
    <!-- Hour hand -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="0" y1="0" x2="18" y2="-10" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <!-- Ticks -->
    <line x1="0" y1="-34" x2="0" y2="-28" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="34" y1="0" x2="28" y2="0" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="0" y1="34" x2="0" y2="28" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="-34" y1="0" x2="-28" y2="0" stroke="#f59e0b" stroke-width="2.5"/>
  </g>

  <!-- Reminder notification cards -->
  <g filter="url(#g)">
    <!-- Card 1 -->
    <rect x="300" y="205" width="86" height="46" rx="12" fill="#1c1007" stroke="#f59e0b" stroke-width="1.8"/>
    <circle cx="318" cy="222" r="7" fill="#f59e0b" opacity="0.9"/>
    <text x="318" y="226" text-anchor="middle" fill="#1c1007" font-size="9" font-family="Arial" font-weight="bold">!</text>
    <rect x="330" y="215" width="48" height="5" rx="2.5" fill="#fde68a" opacity="0.8"/>
    <rect x="330" y="225" width="36" height="4" rx="2" fill="#fbbf24" opacity="0.55"/>
    <rect x="330" y="234" width="42" height="4" rx="2" fill="#fbbf24" opacity="0.38"/>

    <!-- Card 2 -->
    <rect x="304" y="264" width="82" height="42" rx="12" fill="#0a1800" stroke="#4ade80" stroke-width="1.8"/>
    <circle cx="321" cy="280" r="7" fill="#22c55e" opacity="0.9"/>
    <polyline points="316,280 320,284 328,274" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <rect x="333" y="273" width="44" height="5" rx="2.5" fill="#86efac" opacity="0.8"/>
    <rect x="333" y="283" width="32" height="4" rx="2" fill="#4ade80" opacity="0.55"/>
    <rect x="333" y="292" width="38" height="4" rx="2" fill="#4ade80" opacity="0.38"/>
  </g>

  <!-- Connector lines -->
  <g opacity="0.4">
    <line x1="300" y1="215" x2="292" y2="207" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
    <line x1="300" y1="280" x2="292" y2="243" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <!-- Floating particles -->
  <g filter="url(#g)">
    <circle cx="26" cy="220" r="5" fill="#f59e0b" opacity="0.35"/>
    <circle cx="200" cy="372" r="5" fill="#fbbf24" opacity="0.25"/>
    <circle cx="28" cy="310" r="3.5" fill="#4ade80" opacity="0.3"/>
  </g>
</svg>
