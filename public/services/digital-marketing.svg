<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bar1G" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bar2G" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bar3G" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bar4G" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="230" rx="170" ry="150" fill="url(#bgGlow)"/>

  <!-- Dashboard card background -->
  <rect x="42" y="58" width="316" height="260" rx="20" fill="#0f0a14" stroke="#2d1b4e" stroke-width="2"/>
  <!-- Dashboard top bar -->
  <rect x="42" y="58" width="316" height="36" rx="18" fill="#1a0f2e"/>
  <rect x="42" y="76" width="316" height="18" fill="#1a0f2e"/>
  <circle cx="68" cy="76" r="6" fill="#ec4899" opacity="0.8"/>
  <circle cx="88" cy="76" r="6" fill="#f97316" opacity="0.7"/>
  <circle cx="108" cy="76" r="6" fill="#22c55e" opacity="0.7"/>
  <rect x="130" y="70" width="130" height="12" rx="6" fill="#2d1b4e"/>

  <!-- Grid lines -->
  <g stroke="#1f1535" stroke-width="1" opacity="0.8">
    <line x1="62" y1="272" x2="338" y2="272"/>
    <line x1="62" y1="232" x2="338" y2="232"/>
    <line x1="62" y1="192" x2="338" y2="192"/>
    <line x1="62" y1="152" x2="338" y2="152"/>
    <line x1="62" y1="112" x2="338" y2="112"/>
  </g>
  <!-- X axis -->
  <line x1="62" y1="272" x2="338" y2="272" stroke="#3d2b5e" stroke-width="1.5"/>

  <!-- Bar 1 (pink) -->
  <g filter="url(#g)">
    <rect x="80" y="202" width="46" height="70" rx="8" fill="url(#bar1G)"/>
    <rect x="80" y="202" width="46" height="10" rx="8" fill="#f9a8d4" opacity="0.5"/>
  </g>

  <!-- Bar 2 (orange) -->
  <g filter="url(#g)">
    <rect x="148" y="162" width="46" height="110" rx="8" fill="url(#bar2G)"/>
    <rect x="148" y="162" width="46" height="10" rx="8" fill="#fed7aa" opacity="0.5"/>
  </g>

  <!-- Bar 3 (yellow - tallest) -->
  <g filter="url(#g)">
    <rect x="216" y="112" width="46" height="160" rx="8" fill="url(#bar3G)"/>
    <rect x="216" y="112" width="46" height="10" rx="8" fill="#fef08a" opacity="0.5"/>
    <!-- Value bubble -->
    <rect x="214" y="92" width="50" height="22" rx="8" fill="#1a0f2e" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="239" y="107" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="Arial" font-weight="bold">+45%</text>
  </g>

  <!-- Bar 4 (green) -->
  <g filter="url(#g)">
    <rect x="284" y="182" width="46" height="90" rx="8" fill="url(#bar4G)"/>
    <rect x="284" y="182" width="46" height="10" rx="8" fill="#bbf7d0" opacity="0.5"/>
  </g>

  <!-- Trend line -->
  <g filter="url(#g)">
    <polyline points="103,220 171,188 239,145 307,168" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="103" cy="220" r="5" fill="white" opacity="0.8"/>
    <circle cx="171" cy="188" r="5" fill="white" opacity="0.8"/>
    <circle cx="239" cy="145" r="5" fill="white" opacity="0.8"/>
    <circle cx="307" cy="168" r="5" fill="white" opacity="0.8"/>
    <!-- Arrow at end -->
    <polygon points="307,160 318,168 307,176" fill="white" opacity="0.8"/>
  </g>

  <!-- Megaphone (top-left outside card) -->
  <g filter="url(#g)" transform="translate(12,28)">
    <path d="M0,18 L0,32 L10,32 L10,18 L34,4 L34,46 L10,32" fill="#2d1b4e" stroke="#ec4899" stroke-width="2.5"/>
    <!-- Sound waves -->
    <path d="M38,14 Q46,25 38,36" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M42,8  Q54,25 42,42" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M46,2  Q62,25 46,48" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Stats row below card -->
  <g filter="url(#g)">
    <rect x="42" y="328" width="90" height="36" rx="10" fill="#1a0f2e" stroke="#ec4899" stroke-width="1.5"/>
    <text x="87" y="343" text-anchor="middle" fill="#f472b6" font-size="10" font-family="Arial" font-weight="bold">2.8× ROAS</text>
    <text x="87" y="356" text-anchor="middle" fill="#f9a8d4" font-size="8" font-family="Arial" opacity="0.75">Return on Ad Spend</text>

    <rect x="155" y="328" width="90" height="36" rx="10" fill="#1a0a00" stroke="#f97316" stroke-width="1.5"/>
    <text x="200" y="343" text-anchor="middle" fill="#fb923c" font-size="10" font-family="Arial" font-weight="bold">55% LESS</text>
    <text x="200" y="356" text-anchor="middle" fill="#fed7aa" font-size="8" font-family="Arial" opacity="0.75">Manual Work</text>

    <rect x="268" y="328" width="90" height="36" rx="10" fill="#0a1800" stroke="#22c55e" stroke-width="1.5"/>
    <text x="313" y="343" text-anchor="middle" fill="#4ade80" font-size="10" font-family="Arial" font-weight="bold">45% LOWER</text>
    <text x="313" y="356" text-anchor="middle" fill="#bbf7d0" font-size="8" font-family="Arial" opacity="0.75">Cost/Conversion</text>
  </g>
</svg>
