<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bg"><feGaussianBlur stdDeviation="40" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="headG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bodyG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="eyeG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="200" cy="210" r="165" fill="url(#bgGlow)"/>

  <!-- Antenna -->
  <line x1="200" y1="58" x2="200" y2="88" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
  <g filter="url(#g)">
    <circle cx="200" cy="50" r="12" fill="#4c1d95" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="200" cy="50" r="5" fill="#c084fc"/>
  </g>

  <!-- Robot head -->
  <rect x="100" y="90" width="200" height="158" rx="28" fill="url(#headG)" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- Eyes -->
  <g filter="url(#g)">
    <!-- Left eye -->
    <rect x="122" y="128" width="62" height="46" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5"/>
    <ellipse cx="153" cy="151" rx="16" ry="14" fill="url(#eyeG)"/>
    <circle cx="153" cy="151" r="6" fill="#0c4a6e"/>
    <circle cx="157" cy="146" r="3" fill="white" opacity="0.8"/>
    <!-- Right eye -->
    <rect x="216" y="128" width="62" height="46" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5"/>
    <ellipse cx="247" cy="151" rx="16" ry="14" fill="url(#eyeG)"/>
    <circle cx="247" cy="151" r="6" fill="#0c4a6e"/>
    <circle cx="251" cy="146" r="3" fill="white" opacity="0.8"/>
  </g>

  <!-- Mouth / speaker -->
  <rect x="136" y="196" width="128" height="22" rx="11" fill="#0f172a" stroke="#7c3aed" stroke-width="1.8"/>
  <g filter="url(#g)">
    <line x1="152" y1="207" x2="162" y2="207" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="170" y1="207" x2="180" y2="207" stroke="#c084fc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="188" y1="207" x2="212" y2="207" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="220" y1="207" x2="230" y2="207" stroke="#c084fc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="238" y1="207" x2="248" y2="207" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Ear panels -->
  <rect x="72" y="128" width="30" height="58" rx="10" fill="#3b0764" stroke="#7c3aed" stroke-width="1.8"/>
  <rect x="298" y="128" width="30" height="58" rx="10" fill="#3b0764" stroke="#7c3aed" stroke-width="1.8"/>
  <g filter="url(#g)">
    <circle cx="87" cy="157" r="7" fill="#a855f7"/>
    <circle cx="313" cy="157" r="7" fill="#a855f7"/>
  </g>

  <!-- Body -->
  <rect x="130" y="262" width="140" height="68" rx="18" fill="url(#bodyG)" stroke="#7c3aed" stroke-width="2"/>
  <g filter="url(#g)">
    <circle cx="168" cy="296" r="11" fill="#1e1b4b" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="168" cy="296" r="4.5" fill="#22d3ee"/>
    <circle cx="200" cy="296" r="11" fill="#1e1b4b" stroke="#a855f7" stroke-width="2"/>
    <circle cx="200" cy="296" r="4.5" fill="#a855f7"/>
    <circle cx="232" cy="296" r="11" fill="#1e1b4b" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="232" cy="296" r="4.5" fill="#22d3ee"/>
  </g>

  <!-- Chat bubble top-right -->
  <g filter="url(#g)">
    <rect x="290" y="72" width="90" height="62" rx="14" fill="#1e1b4b" stroke="#22d3ee" stroke-width="2"/>
    <polygon points="294,134 288,148 310,134" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1.5"/>
    <rect x="302" y="88" width="64" height="6" rx="3" fill="#22d3ee" opacity="0.9"/>
    <rect x="302" y="100" width="50" height="5" rx="2.5" fill="#67e8f9" opacity="0.7"/>
    <rect x="302" y="112" width="58" height="5" rx="2.5" fill="#22d3ee" opacity="0.5"/>
  </g>

  <!-- Chat bubble top-left -->
  <g filter="url(#g)">
    <rect x="20" y="92" width="80" height="50" rx="12" fill="#3b0764" stroke="#a855f7" stroke-width="1.8"/>
    <polygon points="96,130 104,144 88,130" fill="#3b0764" stroke="#a855f7" stroke-width="1.2"/>
    <rect x="30" y="106" width="56" height="5" rx="2.5" fill="#c084fc" opacity="0.85"/>
    <rect x="30" y="117" width="42" height="5" rx="2.5" fill="#c084fc" opacity="0.6"/>
  </g>

  <!-- Circuit traces on head corners -->
  <g stroke="#7c3aed" stroke-width="1.2" opacity="0.4" fill="none">
    <path d="M110,110 L110,98 L130,98"/>
    <path d="M290,110 L290,98 L270,98"/>
    <path d="M110,228 L110,240 L130,240"/>
    <path d="M290,228 L290,240 L270,240"/>
    <circle cx="110" cy="98" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="290" cy="98" r="3" fill="#7c3aed" opacity="0.6"/>
  </g>

  <!-- Floating particles -->
  <g filter="url(#g)">
    <circle cx="42" cy="200" r="5" fill="#a855f7" opacity="0.4"/>
    <circle cx="358" cy="210" r="4" fill="#22d3ee" opacity="0.4"/>
    <circle cx="200" cy="370" r="5" fill="#7c3aed" opacity="0.3"/>
    <circle cx="60" cy="330" r="3" fill="#c084fc" opacity="0.3"/>
    <circle cx="340" cy="330" r="3" fill="#67e8f9" opacity="0.3"/>
  </g>
</svg>
