<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="gearG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="block1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C6FF00"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="block2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="block3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C6FF00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="200" cy="200" r="170" fill="url(#bgGlow)"/>

  <!-- Blueprint grid -->
  <g stroke="#1e1b4b" stroke-width="1" opacity="0.6">
    <line x1="40" y1="80"  x2="40" y2="360"/>
    <line x1="120" y1="40" x2="120" y2="360"/>
    <line x1="200" y1="40" x2="200" y2="360"/>
    <line x1="280" y1="40" x2="280" y2="360"/>
    <line x1="360" y1="80" x2="360" y2="360"/>
    <line x1="40" y1="80"  x2="360" y2="80"/>
    <line x1="40" y1="160" x2="360" y2="160"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
    <line x1="40" y1="320" x2="360" y2="320"/>
  </g>

  <!-- Circuit traces (neon) -->
  <g filter="url(#g)" stroke-linecap="round" fill="none">
    <path d="M120,160 L120,120 L200,120" stroke="#C6FF00" stroke-width="2.5" opacity="0.7"/>
    <path d="M280,160 L280,120 L200,120" stroke="#C6FF00" stroke-width="2.5" opacity="0.7"/>
    <path d="M120,240 L120,280 L200,280" stroke="#22d3ee" stroke-width="2.5" opacity="0.65"/>
    <path d="M280,240 L280,280 L200,280" stroke="#22d3ee" stroke-width="2.5" opacity="0.65"/>
    <path d="M40,200 L80,200 L80,160" stroke="#f97316" stroke-width="2" opacity="0.6"/>
    <path d="M360,200 L320,200 L320,160" stroke="#f97316" stroke-width="2" opacity="0.6"/>
    <path d="M40,200 L80,200 L80,240" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
    <path d="M360,200 L320,200 L320,240" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Junction dots on traces -->
  <g filter="url(#g)">
    <circle cx="200" cy="120" r="6" fill="#C6FF00"/>
    <circle cx="200" cy="280" r="6" fill="#22d3ee"/>
    <circle cx="80" cy="200" r="5" fill="#f97316"/>
    <circle cx="320" cy="200" r="5" fill="#f97316"/>
    <circle cx="120" cy="120" r="4" fill="#C6FF00" opacity="0.7"/>
    <circle cx="280" cy="120" r="4" fill="#C6FF00" opacity="0.7"/>
    <circle cx="120" cy="280" r="4" fill="#22d3ee" opacity="0.7"/>
    <circle cx="280" cy="280" r="4" fill="#22d3ee" opacity="0.7"/>
  </g>

  <!-- Central gear -->
  <g filter="url(#g)">
    <circle cx="200" cy="200" r="52" fill="url(#gearG)" stroke="#818cf8" stroke-width="3"/>
    <circle cx="200" cy="200" r="33" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
    <circle cx="200" cy="200" r="12" fill="#818cf8"/>
    <!-- Gear teeth (8) -->
    <rect x="196" y="144" width="8" height="15" rx="4" fill="#818cf8"/>
    <rect x="196" y="241" width="8" height="15" rx="4" fill="#818cf8"/>
    <rect x="144" y="196" width="15" height="8" rx="4" fill="#818cf8"/>
    <rect x="241" y="196" width="15" height="8" rx="4" fill="#818cf8"/>
    <rect x="162" y="154" width="8" height="15" rx="4" fill="#a5b4fc" transform="rotate(45 166 161)"/>
    <rect x="230" y="231" width="8" height="15" rx="4" fill="#a5b4fc" transform="rotate(45 234 238)"/>
    <rect x="228" y="154" width="8" height="15" rx="4" fill="#a5b4fc" transform="rotate(-45 232 161)"/>
    <rect x="162" y="230" width="8" height="15" rx="4" fill="#a5b4fc" transform="rotate(-45 166 237)"/>
  </g>

  <!-- Corner module blocks -->
  <!-- Top-left: Lime block -->
  <g filter="url(#g)">
    <rect x="52" y="52" width="64" height="64" rx="14" fill="#1a2e00" stroke="#C6FF00" stroke-width="2.5"/>
    <rect x="64" y="68" width="40" height="7" rx="3.5" fill="#C6FF00" opacity="0.9"/>
    <rect x="64" y="80" width="30" height="6" rx="3" fill="#a3e635" opacity="0.7"/>
    <rect x="64" y="91" width="36" height="6" rx="3" fill="#C6FF00" opacity="0.5"/>
    <rect x="64" y="102" width="22" height="5" rx="2.5" fill="#84cc16" opacity="0.4"/>
    <circle cx="88" cy="62" r="5" fill="#C6FF00"/>
  </g>

  <!-- Top-right: Orange block -->
  <g filter="url(#g)">
    <rect x="284" y="52" width="64" height="64" rx="14" fill="#1c0a00" stroke="#f97316" stroke-width="2.5"/>
    <!-- Mini bar chart -->
    <rect x="296" y="98" width="8" height="14" rx="3" fill="#fb923c" opacity="0.7"/>
    <rect x="308" y="88" width="8" height="24" rx="3" fill="#f97316" opacity="0.85"/>
    <rect x="320" y="76" width="8" height="36" rx="3" fill="#fb923c"/>
    <line x1="293" y1="112" x2="332" y2="112" stroke="#7c2d12" stroke-width="1.5"/>
  </g>

  <!-- Bottom-left: Cyan block -->
  <g filter="url(#g)">
    <rect x="52" y="284" width="64" height="64" rx="14" fill="#001c2e" stroke="#22d3ee" stroke-width="2.5"/>
    <!-- API/Connections icon -->
    <circle cx="72" cy="308" r="8" fill="#0e7490" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="98" cy="308" r="8" fill="#0e7490" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="80" y1="308" x2="90" y2="308" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="85" cy="330" r="10" fill="#164e63" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="85" y="334" text-anchor="middle" fill="#22d3ee" font-size="11" font-family="Arial" font-weight="bold">API</text>
  </g>

  <!-- Bottom-right: Purple block -->
  <g filter="url(#g)">
    <rect x="284" y="284" width="64" height="64" rx="14" fill="#1a0533" stroke="#a855f7" stroke-width="2.5"/>
    <!-- Check / build icon -->
    <polyline points="298,316 308,328 332,300" fill="none" stroke="#c084fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="348" cy="298" r="7" fill="#7c3aed"/>
    <text x="348" y="302" text-anchor="middle" fill="white" font-size="8" font-family="Arial" font-weight="bold">✦</text>
  </g>

  <!-- Data flow particles -->
  <g filter="url(#g)">
    <circle cx="160" cy="120" r="5" fill="#C6FF00" opacity="0.8"/>
    <circle cx="240" cy="280" r="5" fill="#22d3ee" opacity="0.75"/>
    <circle cx="80" cy="160" r="4" fill="#f97316" opacity="0.65"/>
    <circle cx="320" cy="240" r="4" fill="#a855f7" opacity="0.6"/>
    <circle cx="200" cy="50" r="4" fill="#C6FF00" opacity="0.5"/>
    <circle cx="200" cy="358" r="4" fill="#22d3ee" opacity="0.4"/>
  </g>
</svg>
