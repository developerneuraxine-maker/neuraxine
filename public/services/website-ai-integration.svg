<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="browserG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="widgetG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="200" rx="170" ry="155" fill="url(#bgGlow)"/>

  <!-- Browser frame -->
  <rect x="36" y="64" width="328" height="252" rx="16" fill="#040d14" stroke="#164e63" stroke-width="2.5"/>
  <!-- Browser top bar -->
  <rect x="36" y="64" width="328" height="42" rx="16" fill="url(#browserG)"/>
  <rect x="36" y="88" width="328" height="18" fill="url(#browserG)"/>
  <!-- Traffic lights -->
  <circle cx="62" cy="85" r="7" fill="#ef4444" opacity="0.9"/>
  <circle cx="82" cy="85" r="7" fill="#f59e0b" opacity="0.9"/>
  <circle cx="102" cy="85" r="7" fill="#22c55e" opacity="0.9"/>
  <!-- Address bar -->
  <rect x="128" y="77" width="196" height="16" rx="8" fill="#0c4a6e"/>
  <circle cx="140" cy="85" r="4" fill="#22d3ee" opacity="0.7"/>
  <rect x="150" y="82" width="100" height="6" rx="3" fill="#67e8f9" opacity="0.45"/>
  <rect x="316" y="79" width="8" height="12" rx="3" fill="#22d3ee" opacity="0.5"/>

  <!-- Website content -->
  <!-- Hero image placeholder -->
  <rect x="52" y="122" width="196" height="90" rx="8" fill="#0a1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="100" cy="155" r="22" fill="#1e3a5f" opacity="0.6"/>
  <line x1="52" y1="167" x2="248" y2="167" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
  <g filter="url(#g)" opacity="0.6">
    <line x1="68" y1="138" x2="180" y2="138" stroke="#22d3ee" stroke-width="2"/>
    <line x1="68" y1="150" x2="150" y2="150" stroke="#22d3ee" stroke-width="1.5"/>
  </g>
  <!-- CTA button in hero -->
  <rect x="68" y="186" width="72" height="18" rx="9" fill="#0e7490"/>
  <g filter="url(#g)">
    <rect x="68" y="186" width="72" height="18" rx="9" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  </g>

  <!-- Text content lines -->
  <rect x="52" y="224" width="140" height="7" rx="3.5" fill="#1e3a5f"/>
  <rect x="52" y="238" width="110" height="6" rx="3" fill="#1e3a5f" opacity="0.7"/>
  <rect x="52" y="251" width="124" height="6" rx="3" fill="#1e3a5f" opacity="0.5"/>
  <rect x="52" y="264" width="84"  height="6" rx="3" fill="#1e3a5f" opacity="0.35"/>

  <!-- Right sidebar card -->
  <rect x="262" y="122" width="86" height="148" rx="10" fill="#0a1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="272" y="134" width="66" height="38" rx="6" fill="#0e2a40"/>
  <rect x="278" y="140" width="40" height="5" rx="2.5" fill="#38bdf8" opacity="0.6"/>
  <rect x="278" y="150" width="52" height="5" rx="2.5" fill="#38bdf8" opacity="0.4"/>
  <rect x="278" y="160" width="32" height="5" rx="2.5" fill="#38bdf8" opacity="0.3"/>
  <rect x="272" y="182" width="66" height="36" rx="6" fill="#0e2a40" opacity="0.7"/>
  <rect x="272" y="228" width="66" height="28" rx="6" fill="#0e2a40" opacity="0.5"/>

  <!-- AI Chat Widget (glowing) -->
  <g filter="url(#g)">
    <rect x="234" y="220" width="120" height="92" rx="14" fill="#2d0f5a" stroke="#a855f7" stroke-width="2.5"/>
    <!-- Widget header -->
    <rect x="234" y="220" width="120" height="30" rx="14" fill="url(#widgetG)"/>
    <rect x="234" y="238" width="120" height="12" fill="url(#widgetG)"/>
    <circle cx="252" cy="235" r="9" fill="#6d28d9"/>
    <circle cx="252" cy="232" r="4" fill="#c084fc" opacity="0.9"/>
    <path d="M246,240 Q252,238 258,240" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <rect x="266" y="230" width="52" height="5" rx="2.5" fill="white" opacity="0.8"/>
    <rect x="266" y="238" width="36" height="4" rx="2" fill="white" opacity="0.5"/>
    <!-- Chat messages in widget -->
    <rect x="244" y="260" width="64" height="14" rx="7" fill="#3b1070" stroke="#a855f7" stroke-width="1"/>
    <rect x="260" y="280" width="80" height="14" rx="7" fill="#1e0a3d" stroke="#7c3aed" stroke-width="1"/>
    <!-- Cursor -->
    <rect x="246" y="298" width="2" height="10" rx="1" fill="#c084fc" opacity="0.9"/>
  </g>

  <!-- Chat widget launch button (outside browser) -->
  <g filter="url(#g)">
    <circle cx="348" cy="348" r="26" fill="url(#widgetG)" stroke="#c084fc" stroke-width="2"/>
    <text x="348" y="356" text-anchor="middle" fill="white" font-size="22" font-family="Arial">💬</text>
  </g>

  <!-- Glowing wires from widget to page elements -->
  <g filter="url(#g)" opacity="0.4">
    <line x1="234" y1="265" x2="52" y2="238" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="5 4"/>
    <line x1="234" y1="275" x2="52" y2="251" stroke="#7c3aed" stroke-width="1" stroke-dasharray="5 4"/>
    <circle cx="52" cy="238" r="3.5" fill="#a855f7" opacity="0.7"/>
    <circle cx="52" cy="251" r="3" fill="#7c3aed" opacity="0.6"/>
  </g>

  <!-- Bottom glow -->
  <ellipse cx="200" cy="332" rx="120" ry="8" fill="#06b6d4" opacity="0.08" filter="url(#g)"/>

  <!-- Floating particles -->
  <g filter="url(#g)">
    <circle cx="22" cy="200" r="4" fill="#22d3ee" opacity="0.35"/>
    <circle cx="200" cy="375" r="4" fill="#7c3aed" opacity="0.3"/>
    <circle cx="380" cy="180" r="3.5" fill="#a855f7" opacity="0.3"/>
  </g>
</svg>
